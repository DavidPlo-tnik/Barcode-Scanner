<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<title>MD Scanner</title>
<style>
  /* ---------- typography & reset ---------- */
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --bg-elev: #161616;
    --bg-elev-2: #1f1f1f;
    --line: #2a2a2a;
    --line-strong: #3a3a3a;
    --ink: #f4f1ea;
    --ink-dim: #8a8580;
    --ink-faint: #555049;
    --accent: #e8c547;       /* warm yellow — like a price tag */
    --accent-ink: #1a1500;
    --positive: #6fb36f;
    --negative: #d97559;
    --neutral: #9aa3ad;
    --safe: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', ui-monospace, monospace;
    font-size: 14px;
    line-height: 1.4;
    height: 100%;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding-top: var(--safe);
    padding-bottom: var(--safe-b);
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  input { font: inherit; color: inherit; background: none; border: none; outline: none; }

  /* ---------- top bar ---------- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .brand {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 800;
    font-size: 19px;
    letter-spacing: -0.01em;
  }
  .brand .dot { color: var(--accent); }
  .brand-sub {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    margin-top: 2px;
  }
  .meta {
    text-align: right;
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
  }
  .meta b { color: var(--ink); display: block; font-size: 10px; letter-spacing: 0.15em; }

  /* ---------- main views ---------- */
  main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .view { display: none; flex: 1; flex-direction: column; min-height: 0; }
  .view.active { display: flex; }

  /* ---------- scanner ---------- */
  #scanner-view { position: relative; }
  #video-wrap {
    flex: 1;
    background: #000;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  video {
    width: 100%; height: 100%; object-fit: cover;
    display: block;
  }
  .reticle {
    position: absolute; inset: 0;
    pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .reticle-box {
    width: 78%; max-width: 360px; aspect-ratio: 5/3;
    border: 1px solid rgba(232, 197, 71, 0.5);
    box-shadow: 0 0 0 99999px rgba(0,0,0,0.42);
    border-radius: 2px;
    position: relative;
  }
  .reticle-box::before, .reticle-box::after,
  .reticle-box > span::before, .reticle-box > span::after {
    content: ''; position: absolute; width: 22px; height: 22px;
    border: 2px solid var(--accent);
  }
  .reticle-box::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .reticle-box::after { top: -1px; right: -1px; border-left: none; border-bottom: none; }
  .reticle-box > span::before { bottom: -1px; left: -1px; border-right: none; border-top: none; }
  .reticle-box > span::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }
  .reticle-line {
    position: absolute; left: 8%; right: 8%; top: 50%;
    height: 1px; background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: scanline 2s ease-in-out infinite alternate;
  }
  @keyframes scanline {
    from { transform: translateY(-30%); opacity: 0.4; }
    to   { transform: translateY(30%); opacity: 1; }
  }
  .scan-hint {
    position: absolute; bottom: calc(110px + var(--safe-b)); left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
  }
  .scan-status {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
    padding: 6px 12px; border-radius: 100px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--accent);
    border: 1px solid rgba(232, 197, 71, 0.35);
    display: none;
  }
  .scan-status.on { display: block; }

  /* ---------- bottom bar (scanner) ---------- */
  .bottom-bar {
    padding: 14px 16px calc(14px + var(--safe-b));
    background: var(--bg);
    border-top: 1px solid var(--line);
    display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px;
    align-items: center;
  }
  .search-input {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 11px 12px;
    width: 100%;
    font-size: 13px;
    color: var(--ink);
  }
  .search-input::placeholder { color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; }
  .search-input:focus { border-color: var(--accent); }
  .icon-btn {
    width: 44px; height: 44px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 6px;
    display: grid; place-items: center;
    color: var(--ink);
    transition: all 0.15s;
  }
  .icon-btn:active { background: var(--bg-elev-2); transform: scale(0.96); }
  .icon-btn.primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .torch-btn[data-on="true"] { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

  /* ---------- search results overlay ---------- */
  .search-results {
    position: fixed;
    left: 0; right: 0;
    bottom: calc(72px + var(--safe-b));
    top: 56px;
    background: var(--bg);
    z-index: 20;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    border-top: 1px solid var(--line);
  }
  .search-results.on { display: flex; }
  .result-row {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 4px;
  }
  .result-row:active { background: var(--bg-elev); }
  .result-name { font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; line-height: 1.2; }
  .result-meta { font-size: 10.5px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.12em; display: flex; gap: 14px; }
  .result-meta b { color: var(--ink); }

  /* ---------- product detail ---------- */
  #product-view { overflow-y: auto; padding-bottom: 30px; }
  .product-hero {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--line);
  }
  .back-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--ink-dim);
  }
  .code-tag {
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--ink-dim);
    background: var(--bg-elev);
    border: 1px solid var(--line);
    padding: 4px 8px; border-radius: 3px;
  }
  .product-name {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .product-format {
    display: inline-block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
  }
  .price-row {
    margin-top: 14px;
    display: flex; align-items: baseline; gap: 12px;
  }
  .price {
    font-family: 'Fraunces', serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .price-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--ink-dim);
  }
  .no-price {
    font-family: 'Fraunces', serif;
    font-size: 22px; color: var(--ink-faint); font-style: italic;
  }

  /* metric grid */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--line);
  }
  .stat {
    padding: 16px 18px;
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .stat:nth-child(2n) { border-right: none; }
  .stat:nth-last-child(-n+2) { border-bottom: none; }
  .stat-label {
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .stat-val {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .stat-sub {
    font-size: 10.5px;
    color: var(--ink-dim);
    margin-top: 4px;
  }
  .trend {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
  }
  .trend.up { color: var(--positive); }
  .trend.down { color: var(--negative); }
  .trend.flat { color: var(--neutral); }

  /* chart section */
  .section-head {
    padding: 18px 18px 8px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }
  .toggle-group {
    display: flex; gap: 0;
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .toggle-btn {
    padding: 5px 10px;
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    background: var(--bg-elev);
  }
  .toggle-btn.on { background: var(--accent); color: var(--accent-ink); }

  .chart-wrap {
    padding: 4px 12px 12px;
    position: relative;
  }
  #chart {
    width: 100%; height: 180px; display: block;
  }
  .chart-axis {
    display: flex; justify-content: space-between;
    padding: 0 8px;
    font-size: 9px;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* breakdown */
  .breakdown {
    padding: 14px 18px;
    border-top: 1px solid var(--line);
  }
  .breakdown-row {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    align-items: center;
    padding: 9px 0;
    font-size: 12px;
    border-bottom: 1px dashed var(--line);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-label { color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.12em; font-size: 10.5px; }
  .breakdown-bar {
    height: 4px;
    background: var(--bg-elev-2);
    border-radius: 2px; overflow: hidden;
    margin: 0 12px;
  }
  .breakdown-bar > span {
    display: block; height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .breakdown-val { text-align: right; font-weight: 700; }

  /* not found */
  .not-found {
    padding: 40px 24px;
    text-align: center;
  }
  .not-found h2 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .not-found p { color: var(--ink-dim); font-size: 12px; margin-bottom: 4px; }
  .not-found .codeshown {
    margin-top: 18px;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    padding: 10px 14px;
    border-radius: 4px;
    display: inline-block;
    letter-spacing: 0.05em;
  }

  /* loading screen */
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg); z-index: 100;
    text-align: center; padding: 24px;
  }
  #loading h1 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 800; margin-bottom: 10px; }
  #loading h1 .dot { color: var(--accent); }
  #loading .sub { color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 30px; }
  #loading .progress { width: 200px; height: 2px; background: var(--bg-elev); position: relative; overflow: hidden; }
  #loading .progress::before {
    content: ''; position: absolute; left: 0; top: 0; height: 100%;
    background: var(--accent); width: 30%;
    animation: load 1.2s ease-in-out infinite;
  }
  @keyframes load { 0% { left: -30%; } 100% { left: 100%; } }
  #loading.gone { display: none; }

  /* error / camera permission */
  .perm-msg {
    padding: 24px; text-align: center; color: var(--ink-dim); font-size: 12px;
  }
  .perm-msg button {
    margin-top: 14px;
    background: var(--accent); color: var(--accent-ink);
    padding: 10px 18px; border-radius: 4px;
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em;
    font-size: 11px;
  }

  /* tooltip on chart */
  .chart-tip {
    position: absolute;
    background: var(--bg-elev-2);
    border: 1px solid var(--line-strong);
    color: var(--ink);
    padding: 6px 9px;
    border-radius: 3px;
    font-size: 11px;
    pointer-events: none;
    transform: translate(-50%, -120%);
    white-space: nowrap;
    display: none;
    z-index: 5;
  }
  .chart-tip b { color: var(--accent); }
</style>
</head>
<body>

<div id="loading">
  <h1>Marché Décarie<span class="dot">.</span></h1>
  <div class="sub">Inventory Scanner</div>
  <div class="progress"></div>
</div>

<header>
  <div>
    <div class="brand">MD<span class="dot">.</span> Scanner</div>
    <div class="brand-sub" id="header-sub">Loading data…</div>
  </div>
  <div class="meta">
    <b id="header-date">—</b>
    <span>Data through</span>
  </div>
</header>

<main>
  <!-- SCANNER VIEW -->
  <section class="view active" id="scanner-view">
    <div id="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <div class="reticle">
        <div class="reticle-box"><span></span><div class="reticle-line"></div></div>
      </div>
      <div class="scan-status" id="scan-status">Scanning…</div>
      <div class="scan-hint" id="scan-hint">Align barcode within frame</div>
    </div>

    <div id="search-results" class="search-results"></div>

    <div class="bottom-bar">
      <input class="search-input" id="search-input" placeholder="Search by name or code" autocomplete="off" inputmode="search" />
      <button class="icon-btn torch-btn" id="torch-btn" data-on="false" title="Flashlight">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6l-1 4h-4z"/><path d="M7 2h10v8a5 5 0 0 1-10 0z"/><path d="M12 2v6"/></svg>
      </button>
      <button class="icon-btn" id="cam-flip-btn" title="Flip camera">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h3l2-3h8l2 3h3v13H3z"/><circle cx="12" cy="13" r="4"/><path d="M16 9l2 -2"/></svg>
      </button>
    </div>
  </section>

  <!-- PRODUCT VIEW -->
  <section class="view" id="product-view"></section>
</main>

<script>
/* =============================================================
 * MD Scanner — single-file PWA
 * ============================================================= */

let DATA = null;          // { meta, p: { code: [...] } }
let SCHEMA = null;        // field-name list
const FIELD = {};         // map field -> index

// Lookup index keyed by various code variants
const codeIndex = new Map();   // normalizedCode -> productCode (canonical)
let codeList = [];             // for substring search

let currentStream = null;
let currentTrack = null;
let detector = null;
let detectorActive = false;
let usingFront = false;
let scanBuffer = new Set();
let scanCooldownUntil = 0;

/* ---------- Data load ---------- */
async function loadData() {
  const res = await fetch('products_compact.json', { cache: 'force-cache' });
  if (!res.ok) throw new Error('data load failed');
  DATA = await res.json();
  SCHEMA = DATA.meta.schema;
  SCHEMA.forEach((k, i) => FIELD[k] = i);

  // Build code lookup with variants
  for (const code of Object.keys(DATA.p)) {
    addCodeVariants(code);
    codeList.push(code);
  }

  document.getElementById('header-sub').textContent =
    DATA.meta.product_count.toLocaleString() + ' products · 52 weeks';
  document.getElementById('header-date').textContent =
    DATA.meta.anchor_date;
  document.getElementById('loading').classList.add('gone');
}

function addCodeVariants(code) {
  // Map both stripped and zero-padded versions back to canonical code
  codeIndex.set(code, code);
  // Numeric: strip leading zeros and try padding to 12, 13, 14
  const stripped = code.replace(/^0+/, '');
  if (stripped !== code) codeIndex.set(stripped, code);
  // Pad to common barcode lengths
  for (const len of [12, 13, 14]) {
    if (code.length < len) codeIndex.set(code.padStart(len, '0'), code);
    if (stripped.length < len) codeIndex.set(stripped.padStart(len, '0'), code);
  }
}

function findByCode(scanned) {
  if (!scanned) return null;
  const candidates = [
    scanned,
    scanned.replace(/^0+/, ''),
    scanned.padStart(12, '0'),
    scanned.padStart(13, '0'),
  ];
  for (const c of candidates) {
    if (codeIndex.has(c)) return codeIndex.get(c);
  }
  return null;
}

/* ---------- Camera + scanning ---------- */
async function startCamera(facing = 'environment') {
  stopCamera();
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: facing },
        width:  { ideal: 1280 },
        height: { ideal: 720  },
      },
      audio: false
    });
    currentStream = stream;
    currentTrack = stream.getVideoTracks()[0];
    const v = document.getElementById('video');
    v.srcObject = stream;
    await v.play().catch(() => {});

    // Init BarcodeDetector if available
    if ('BarcodeDetector' in window && !detector) {
      try {
        detector = new BarcodeDetector({
          formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf']
        });
      } catch (e) {
        detector = null;
      }
    }

    if (detector) {
      detectorActive = true;
      document.getElementById('scan-status').classList.add('on');
      scanLoop();
    } else {
      document.getElementById('scan-hint').innerHTML =
        'Barcode API unavailable — use search below';
    }
  } catch (e) {
    document.getElementById('video-wrap').innerHTML =
      '<div class="perm-msg">Camera access needed.<br>Check Chrome site settings.<br>' +
      '<button onclick="startCamera()">Try again</button></div>';
  }
}

function stopCamera() {
  detectorActive = false;
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
    currentTrack = null;
  }
}

async function scanLoop() {
  const v = document.getElementById('video');
  if (!detectorActive) return;
  if (v.readyState < 2) {
    requestAnimationFrame(scanLoop);
    return;
  }
  if (Date.now() < scanCooldownUntil) {
    requestAnimationFrame(scanLoop);
    return;
  }
  try {
    const codes = await detector.detect(v);
    if (codes && codes.length) {
      const raw = codes[0].rawValue;
      handleScan(raw);
    }
  } catch (e) {
    // detect can throw transiently — ignore
  }
  requestAnimationFrame(scanLoop);
}

function handleScan(code) {
  if (!code) return;
  // Visual + haptic feedback
  if (navigator.vibrate) navigator.vibrate(60);
  scanCooldownUntil = Date.now() + 1500;
  flashReticle();
  const matched = findByCode(code);
  if (matched) {
    showProduct(matched);
  } else {
    showNotFound(code);
  }
}

function flashReticle() {
  const el = document.querySelector('.reticle-box');
  if (!el) return;
  el.style.transition = 'box-shadow 0.15s';
  el.style.boxShadow = '0 0 0 99999px rgba(232, 197, 71, 0.15)';
  setTimeout(() => { el.style.boxShadow = ''; }, 250);
}

/* ---------- Torch ---------- */
async function toggleTorch() {
  const btn = document.getElementById('torch-btn');
  if (!currentTrack) return;
  const caps = currentTrack.getCapabilities && currentTrack.getCapabilities();
  if (!caps || !caps.torch) {
    btn.style.opacity = '0.4';
    return;
  }
  const on = btn.dataset.on === 'true';
  try {
    await currentTrack.applyConstraints({ advanced: [{ torch: !on }] });
    btn.dataset.on = (!on).toString();
  } catch (e) {}
}

/* ---------- Camera flip ---------- */
function flipCamera() {
  usingFront = !usingFront;
  startCamera(usingFront ? 'user' : 'environment');
}

/* ---------- Search ---------- */
function setupSearch() {
  const inp = document.getElementById('search-input');
  const out = document.getElementById('search-results');
  let t = null;
  inp.addEventListener('input', () => {
    const q = inp.value.trim();
    if (!q) { out.classList.remove('on'); out.innerHTML = ''; return; }
    clearTimeout(t);
    t = setTimeout(() => doSearch(q), 100);
  });
  inp.addEventListener('focus', () => {
    if (inp.value.trim()) doSearch(inp.value.trim());
  });
}

function doSearch(q) {
  const out = document.getElementById('search-results');
  const upper = q.toUpperCase();
  const isNumeric = /^\d+$/.test(q);
  const results = [];

  // If numeric, try exact code match first
  if (isNumeric) {
    const m = findByCode(q);
    if (m) results.push(m);
    // Also include codes that start with the digits
    for (const c of codeList) {
      if (c.includes(q) && c !== m) {
        results.push(c);
        if (results.length >= 30) break;
      }
    }
  }

  // Name search
  if (results.length < 30) {
    for (const code of codeList) {
      const rec = DATA.p[code];
      if (rec[FIELD.name].toUpperCase().includes(upper)) {
        if (!results.includes(code)) results.push(code);
        if (results.length >= 50) break;
      }
    }
  }

  // Sort by total revenue desc
  results.sort((a, b) => DATA.p[b][FIELD.total_amt] - DATA.p[a][FIELD.total_amt]);

  out.innerHTML = '';
  if (!results.length) {
    out.innerHTML = '<div class="perm-msg">No matches</div>';
  } else {
    for (const code of results.slice(0, 50)) {
      const rec = DATA.p[code];
      const row = document.createElement('div');
      row.className = 'result-row';
      const price = rec[FIELD.price];
      row.innerHTML = `
        <div class="result-name">${escapeHtml(rec[FIELD.name])}</div>
        <div class="result-meta">
          <span>${escapeHtml(code)}</span>
          <span><b>${price !== null ? '$' + price.toFixed(2) : '—'}</b></span>
          <span><b>${rec[FIELD.total_qty].toLocaleString()}</b> sold/yr</span>
        </div>`;
      row.addEventListener('click', () => {
        document.getElementById('search-input').value = '';
        out.classList.remove('on');
        out.innerHTML = '';
        showProduct(code);
      });
      out.appendChild(row);
    }
  }
  out.classList.add('on');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

/* ---------- Product detail ---------- */
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(name + '-view').classList.add('active');
}

function showProduct(code) {
  const rec = DATA.p[code];
  if (!rec) { showNotFound(code); return; }
  const name = rec[FIELD.name];
  const price = rec[FIELD.price];
  const fmt = rec[FIELD.format];
  const wQty = rec[FIELD.weekly_qty];
  const wAmt = rec[FIELD.weekly_amt];
  const totQ = rec[FIELD.total_qty];
  const totA = rec[FIELD.total_amt];
  const wks  = rec[FIELD.weeks_with_sales];
  const r4Q  = rec[FIELD.recent4_qty];
  const p4Q  = rec[FIELD.prior4_qty];

  // Computed
  const avgWQty = totQ / 52;
  const avgWAmt = totA / 52;
  const activeAvgQty = wks > 0 ? totQ / wks : 0;
  const activeAvgAmt = wks > 0 ? totA / wks : 0;
  const trendPct = p4Q > 0 ? ((r4Q - p4Q) / p4Q * 100) : (r4Q > 0 ? 100 : 0);

  // Quarterly breakdown (already 13-week sums)
  const q1 = wQty.slice(0, 13).reduce((a,b)=>a+b, 0);
  const q2 = wQty.slice(13, 26).reduce((a,b)=>a+b, 0);
  const q3 = wQty.slice(26, 39).reduce((a,b)=>a+b, 0);
  const q4 = wQty.slice(39, 52).reduce((a,b)=>a+b, 0);
  const qMax = Math.max(q1, q2, q3, q4, 1);

  const view = document.getElementById('product-view');
  view.innerHTML = `
    <div class="product-hero">
      <div class="back-row">
        <button class="back-btn" onclick="goBack()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          Back
        </button>
        <span class="code-tag">${escapeHtml(code)}</span>
      </div>
      <h2 class="product-name">${escapeHtml(name)}</h2>
      ${fmt ? `<span class="product-format">${escapeHtml(fmt)}</span>` : ''}
      <div class="price-row">
        ${price !== null
          ? `<span class="price">$${price.toFixed(2)}</span><span class="price-label">Shelf price</span>`
          : `<span class="no-price">No price on file</span>`}
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label">Avg / Week</div>
        <div class="stat-val">${formatQty(avgWQty)}<span style="font-size:13px;color:var(--ink-dim);font-weight:400"> ${unitLabel(fmt)}</span></div>
        <div class="stat-sub">$${avgWAmt.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Recent 4w Trend</div>
        <div class="stat-val">${formatQty(r4Q)}<span class="trend ${trendClass(trendPct)}">${trendArrow(trendPct)}${Math.abs(trendPct).toFixed(0)}%</span></div>
        <div class="stat-sub">vs prior 4w: ${formatQty(p4Q)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">52-Week Total</div>
        <div class="stat-val">${formatQty(totQ)}</div>
        <div class="stat-sub">$${formatMoney(totA)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Active Velocity</div>
        <div class="stat-val">${formatQty(activeAvgQty)}</div>
        <div class="stat-sub">in ${wks} weeks sold</div>
      </div>
    </div>

    <div class="section-head">
      <h3 class="section-title">Weekly Sales · 52w</h3>
      <div class="toggle-group">
        <button class="toggle-btn on" data-mode="qty">Units</button>
        <button class="toggle-btn"    data-mode="amt">Dollars</button>
      </div>
    </div>
    <div class="chart-wrap">
      <svg id="chart" viewBox="0 0 350 180" preserveAspectRatio="none"></svg>
      <div class="chart-axis"><span>52w ago</span><span>26w</span><span>this wk</span></div>
      <div class="chart-tip" id="chart-tip"></div>
    </div>

    <div class="breakdown">
      <h3 class="section-title" style="margin-bottom:10px">Quarterly Breakdown</h3>
      <div class="breakdown-row">
        <div class="breakdown-label">Q1 · 0–13w</div>
        <div class="breakdown-bar"><span style="width:${q1/qMax*100}%"></span></div>
        <div class="breakdown-val">${formatQty(q1)}</div>
      </div>
      <div class="breakdown-row">
        <div class="breakdown-label">Q2 · 13–26w</div>
        <div class="breakdown-bar"><span style="width:${q2/qMax*100}%"></span></div>
        <div class="breakdown-val">${formatQty(q2)}</div>
      </div>
      <div class="breakdown-row">
        <div class="breakdown-label">Q3 · 26–39w</div>
        <div class="breakdown-bar"><span style="width:${q3/qMax*100}%"></span></div>
        <div class="breakdown-val">${formatQty(q3)}</div>
      </div>
      <div class="breakdown-row">
        <div class="breakdown-label">Q4 · 39–52w</div>
        <div class="breakdown-bar"><span style="width:${q4/qMax*100}%"></span></div>
        <div class="breakdown-val">${formatQty(q4)}</div>
      </div>
    </div>
  `;

  // Render chart and wire toggle
  let mode = 'qty';
  renderChart(wQty, wAmt, mode);
  view.querySelectorAll('.toggle-btn').forEach(b => {
    b.addEventListener('click', () => {
      view.querySelectorAll('.toggle-btn').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      mode = b.dataset.mode;
      renderChart(wQty, wAmt, mode);
    });
  });

  showView('product');
  view.scrollTop = 0;
  stopCamera(); // save battery while viewing
}

function renderChart(wQty, wAmt, mode) {
  const svg = document.getElementById('chart');
  if (!svg) return;
  const data = (mode === 'qty' ? wQty : wAmt).slice().reverse(); // oldest -> newest L->R
  const W = 350, H = 180;
  const PAD_T = 12, PAD_B = 20, PAD_L = 8, PAD_R = 8;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;
  const max = Math.max(...data, 1);
  const n = data.length;

  // Bars
  const barW = innerW / n;
  let bars = '';
  for (let i = 0; i < n; i++) {
    const v = data[i];
    const h = (v / max) * innerH;
    const x = PAD_L + i * barW;
    const y = PAD_T + (innerH - h);
    const opacity = v > 0 ? 0.95 : 0.15;
    bars += `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${(barW - 1.5).toFixed(2)}" height="${Math.max(h, 1).toFixed(2)}" fill="var(--accent)" opacity="${opacity}" data-week="${52 - i}" data-val="${v}"/>`;
  }

  // Trend line (4-week moving average)
  const ma = [];
  for (let i = 0; i < n; i++) {
    const start = Math.max(0, i - 3);
    const slice = data.slice(start, i + 1);
    ma.push(slice.reduce((a,b)=>a+b, 0) / slice.length);
  }
  let path = '';
  for (let i = 0; i < n; i++) {
    const x = PAD_L + i * barW + barW / 2;
    const y = PAD_T + (innerH - (ma[i] / max) * innerH);
    path += (i === 0 ? 'M' : 'L') + x.toFixed(2) + ',' + y.toFixed(2) + ' ';
  }

  svg.innerHTML = `
    <line x1="${PAD_L}" y1="${PAD_T + innerH}" x2="${PAD_L + innerW}" y2="${PAD_T + innerH}" stroke="var(--line)" stroke-width="1"/>
    ${bars}
    <path d="${path}" fill="none" stroke="var(--ink)" stroke-width="1.2" opacity="0.55"/>
  `;

  // Tooltip on tap
  const tip = document.getElementById('chart-tip');
  svg.addEventListener('click', (e) => {
    const rect = svg.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * W;
    const idx = Math.min(n - 1, Math.max(0, Math.floor((x - PAD_L) / barW)));
    const v = data[idx];
    const wkLabel = 52 - idx; // weeks ago
    const txt = mode === 'qty'
      ? `<b>${formatQty(v)}</b> units · ${wkLabel}w ago`
      : `<b>$${formatMoney(v)}</b> · ${wkLabel}w ago`;
    tip.innerHTML = txt;
    tip.style.left = (e.clientX - rect.left) + 'px';
    tip.style.top  = (e.clientY - rect.top)  + 'px';
    tip.style.display = 'block';
    clearTimeout(tip._t);
    tip._t = setTimeout(() => { tip.style.display = 'none'; }, 2200);
  });
}

function showNotFound(code) {
  const view = document.getElementById('product-view');
  view.innerHTML = `
    <div class="product-hero">
      <div class="back-row">
        <button class="back-btn" onclick="goBack()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          Back
        </button>
      </div>
    </div>
    <div class="not-found">
      <h2>Not in dataset</h2>
      <p>This barcode wasn't in your POS sales for the past 52 weeks,</p>
      <p>or the code in your POS uses a different format.</p>
      <div class="codeshown">${escapeHtml(code)}</div>
    </div>
  `;
  showView('product');
}

function goBack() {
  showView('scanner');
  startCamera(usingFront ? 'user' : 'environment');
}

/* ---------- formatters ---------- */
function formatQty(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  if (n >= 100) return n.toFixed(0);
  if (Number.isInteger(n)) return n.toString();
  return n.toFixed(1);
}
function formatMoney(n) {
  if (n >= 10000) return (n / 1000).toFixed(1) + 'k';
  if (n >= 100) return n.toFixed(0);
  return n.toFixed(2);
}
function unitLabel(fmt) {
  if (!fmt) return 'u';
  const f = fmt.toLowerCase();
  if (f.includes('kg') || f.includes('g')) return 'u'; // weighted but POS qty is units
  return 'u';
}
function trendClass(p) {
  if (p > 5) return 'up';
  if (p < -5) return 'down';
  return 'flat';
}
function trendArrow(p) {
  if (p > 5) return '▲';
  if (p < -5) return '▼';
  return '–';
}

/* ---------- bootstrap ---------- */
async function init() {
  await loadData();
  setupSearch();
  document.getElementById('torch-btn').addEventListener('click', toggleTorch);
  document.getElementById('cam-flip-btn').addEventListener('click', flipCamera);
  // close search on tap outside
  document.addEventListener('click', (e) => {
    const sr = document.getElementById('search-results');
    const inp = document.getElementById('search-input');
    if (!sr.contains(e.target) && e.target !== inp && !inp.contains(e.target)) {
      sr.classList.remove('on');
    }
  });
  await startCamera('environment');

  // Register service worker for offline
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}
window.addEventListener('load', init);
</script>
